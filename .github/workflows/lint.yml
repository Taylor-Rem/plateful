name: linter

# These steps must be the *check* variants. Running the fixers here (pint,
# prettier --write, eslint --fix) mutates the runner's checkout and exits clean,
# so the job passes no matter what the code looks like — which is how ~430 style
# and lint violations accumulated while CI stayed green.
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install

      - name: Check PHP code style
        run: composer lint:check

      - name: Check frontend formatting
        run: npm run format:check

      - name: Lint frontend
        run: npm run lint:check
