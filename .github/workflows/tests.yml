name: tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Match production (PHP 8.4). Re-add 8.5 when an upgrade is planned —
        # a bleeding-edge matrix entry is a flake source, not coverage.
        php-version: ['8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      # Must follow the build: vue-tsc needs the Wayfinder-generated
      # resources/js/{actions,routes}, which are gitignored and emitted by the
      # Vite plugin. That's why this check lives here and not in linter.yml.
      - name: Type check
        run: npm run types:check

      - name: Tests
        run: ./vendor/bin/pest -d memory_limit=512M
