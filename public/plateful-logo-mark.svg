<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plateful logo mark">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15B9B9"/>
      <stop offset="45%" stop-color="#069494"/>
      <stop offset="100%" stop-color="#045F5F"/>
    </linearGradient>
    <linearGradient id="forkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1FC7C7"/>
      <stop offset="100%" stop-color="#0A8E8E"/>
    </linearGradient>
    <radialGradient id="dotGrad" cx="0.36" cy="0.32" r="0.85">
      <stop offset="0%" stop-color="#EA6E6E"/>
      <stop offset="45%" stop-color="#C62A2A"/>
      <stop offset="100%" stop-color="#8A1A1A"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#013838" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Plate rim: a clean teal ring with sharp inner/outer edges -->
    <circle cx="256" cy="256" r="173" fill="none" stroke="url(#ringGrad)" stroke-width="46"/>
    <circle cx="256" cy="256" r="196" fill="none" stroke="#03514F" stroke-width="3" opacity="0.45"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="#03514F" stroke-width="3" opacity="0.5"/>
    <!-- crisp top-left highlight along the bevel -->
    <path d="M256 60 A196 196 0 0 0 84 158" fill="none" stroke="#5FE0E0" stroke-width="5" stroke-linecap="round" opacity="0.55"/>

    <!-- Fork, resting diagonally across the plate, sharper beveled edges -->
    <g transform="translate(256 256) rotate(35)" stroke="#04716F" stroke-width="2.5" stroke-linejoin="round">
      <!-- tines -->
      <rect x="-30" y="-162" width="12" height="86" rx="5" fill="url(#forkGrad)"/>
      <rect x="-6" y="-162" width="12" height="86" rx="5" fill="url(#forkGrad)"/>
      <rect x="18" y="-162" width="12" height="86" rx="5" fill="url(#forkGrad)"/>
      <!-- head block joining the tines -->
      <rect x="-31" y="-92" width="62" height="30" rx="9" fill="url(#forkGrad)"/>
      <!-- neck + handle -->
      <rect x="-11" y="-70" width="22" height="255" rx="11" fill="url(#forkGrad)"/>
      <!-- edge highlight on the handle -->
      <rect x="-7" y="-64" width="4" height="240" rx="2" fill="#7FEAEA" opacity="0.5" stroke="none"/>
    </g>

    <!-- Crimson accent dot / location marker -->
    <circle cx="322" cy="330" r="26" fill="url(#dotGrad)" stroke="#7A1616" stroke-width="2.5"/>
    <circle cx="315" cy="322" r="7" fill="#F4A0A0" opacity="0.75"/>
  </g>
</svg>
